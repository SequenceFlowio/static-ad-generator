name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
        run: npx next build

      - name: Push prebuilt to hostinger-deploy branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B hostinger-deploy
          cp .gitignore .gitignore.bak
          echo '' > .gitignore
          git add -f .next/standalone/
          git add -f .next/static/
          git add package.json next.config.mjs
          mv .gitignore.bak .gitignore
          git commit -m "Deploy prebuilt [skip ci]"
          git push origin hostinger-deploy --force